name: "Cap nhat Ban Tin Sang"

on:
  schedule:
    - cron: "30 22 * * *"
    - cron: "30 4 * * *"
    - cron: "30 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Lay ma nguon"
        uses: actions/checkout@v4

      - name: "Cai Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Cai thu vien"
        run: pip install feedparser requests

      - name: "Lay tin va tao trang"
        run: python fetch_news.py

      - name: "Day ban tin moi len"
        run: |
          git config user.name "ban-tin-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html v2.html
          git commit -m "Cap nhat ban tin" || echo "Khong co thay doi"
          git push
