name: "Cập nhật Bản Tin Sáng"

on:
  schedule:
    - cron: "30 22 * * *"
    - cron: "30 4 * * *"
    - cron: "30 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Lấy mã nguồn"
        uses: actions/checkout@v4

      - name: "Cài Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Cài thư viện"
        run: pip install feedparser requests

      - name: "Lấy tin và tạo trang"
        run: python fetch_news.py

      - name: "Đẩy bản tin mới lên"
        run: |
          git config user.name "ban-tin-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "Cap nhat ban tin" || echo "Khong co thay doi"
          git push
